name: Sync to EasyLibrary

on:
  push:
    branches: [development]
    paths:
      - 'src/imperazim/db/**'

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[sync]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout LibDB
        uses: actions/checkout@v4
        with:
          path: standalone

      - name: Checkout EasyLibrary
        uses: actions/checkout@v4
        with:
          repository: ImperaZim/EasyLibrary
          ref: development
          token: ${{ secrets.SYNC_TOKEN }}
          path: easylibrary

      - name: Sync files
        run: |
          SRC="standalone/src/imperazim/db"
          DEST="easylibrary/src/imperazim/db"

          rm -rf "$DEST"
          mkdir -p "$DEST"

          rsync -av --exclude='LibDB.php' "$SRC/" "$DEST/"

      - name: Commit and push
        run: |
          cd easylibrary
          git config user.name "ImperaZim"
          git config user.email "imperaartz1@gmail.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git add src/imperazim/db/
          git commit -m "[sync] Update embedded LibDB from standalone"
          git push
